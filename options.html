<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>插件设置</title>
  <style>
    body {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .tab-container {
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    .tabs {
      display: flex;
      background-color: #f1f1f1;
    }
    .tab {
      padding: 12px 24px;
      cursor: pointer;
      border: none;
      background: none;
      font-size: 16px;
      font-weight: bold;
      color: #666;
      transition: all 0.3s ease;
    }
    .tab:hover {
      background-color: #ddd;
    }
    .tab.active {
      background-color: #2196F3;
      color: white;
    }
    .tab-content {
      padding: 20px;
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    textarea {
      height: 150px;
      resize: vertical;
    }
    .btn {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .btn-primary {
      background-color: #2196F3;
      color: white;
    }
    .btn-primary:hover {
      background-color: #45a049;
    }
    .btn-danger {
      background-color: #f44336;
      color: white;
    }
    .btn-danger:hover {
      background-color: #da190b;
    }
    .prompt-item {
      padding: 15px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      background-color: #f9f9f9;
    }
    .prompt-item h4 {
      margin-top: 0;
      color: #333;
    }
    .prompt-item p {
      margin: 10px 0;
      color: #666;
    }
    .prompt-actions {
      margin-top: 10px;
    }
    .success-msg {
      color: #2196F3;
      margin: 10px 0;
    }
    .auth-status {
      padding: 10px;
      border-radius: 4px;
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
  <h1>插件设置</h1>
  
  <div class="tab-container">
    <div class="tabs">
      <button class="tab active" data-tab="prompts">提示词管理</button>
      <button class="tab" data-tab="search">搜索设置</button>
      <button class="tab" data-tab="download">下载设置</button>
      <button class="tab" data-tab="auth">认证管理</button>
    </div>
    
    <div class="tab-content active" id="prompts-tab">
      <h2>管理提示词</h2>
      
      <div class="form-group">
        <label for="prompt-name">提示词名称</label>
        <input type="text" id="prompt-name" placeholder="请输入提示词名称">
      </div>
      
      <div class="form-group">
        <label for="prompt-content">提示词内容</label>
        <textarea id="prompt-content" placeholder="请输入提示词内容"></textarea>
      </div>
      
      <button class="btn btn-primary" id="add-prompt">添加提示词</button>
      <button class="btn btn-primary" id="update-prompt" style="display: none;">更新提示词</button>
      
      <div id="success-msg" class="success-msg" style="display: none;"></div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label for="search-prompt">搜索提示词</label>
        <input type="text" id="search-prompt" placeholder="请输入关键词搜索提示词">
      </div>
      
      <h3>已保存的提示词</h3>
      <div id="prompt-list"></div>
    </div>
    
    <div class="tab-content" id="search-tab">
      <h2>小红书搜索页面设置</h2>
      
      <div class="form-group">
        <label for="sort-by">排序依据</label>
        <select id="sort-by">
          <option value="most-liked">最多点赞</option>
          <option value="most-collected">最多收藏</option>
          <option value="most-commented">最多评论</option>
          <option value="latest">最新发布</option>
        </select>
        <small class="hint">在搜索页面自动选择排序方式</small>
      </div>
      
      <div class="form-group">
        <label for="publish-time">发布时间</label>
        <select id="publish-time">
          <option value="week">一周内</option>
          <option value="day">一天内</option>
          <option value="half-year">半年内</option>
          <option value="all">不限</option>
        </select>
        <small class="hint">在搜索页面自动选择发布时间范围</small>
      </div>
      
      <div class="form-group">
        <label for="enable-like-filter">启用点赞数过滤</label>
        <div class="toggle-switch">
          <input type="checkbox" id="enable-like-filter" checked>
          <label for="enable-like-filter" class="toggle-label"></label>
        </div>
        <small class="hint">启用后会过滤点赞数小于阈值的笔记</small>
      </div>
      
      <div class="form-group">
        <label for="like-threshold">点赞数阈值</label>
        <input type="number" id="like-threshold" value="30" min="0" step="1">
        <small class="hint">筛选点赞数大于此值的笔记，默认30</small>
      </div>
      
      <button class="btn btn-primary" id="save-search">保存设置</button>
      <div id="search-success-msg" class="success-msg" style="display: none;"></div>
    </div>
    
    <div class="tab-content" id="download-tab">
      <h2>下载设置</h2>
      
      <div class="form-group">
        <label for="enable-download">小红书笔记图片下载功能</label>
        <div class="toggle-switch">
          <input type="checkbox" id="enable-download" checked>
          <label for="enable-download" class="toggle-label"></label>
        </div>
      </div>
      
      <div class="form-group">
        <label for="download-path">默认下载路径</label>
        <div style="display: flex; gap: 10px;">
          <input type="text" id="download-path" placeholder="留空使用浏览器默认下载路径" style="flex: 1;">
          <!-- <button class="btn btn-secondary" id="select-folder">选择文件夹</button> -->
        </div>
        <small class="hint">留空将使用浏览器默认下载路径，图片会保存在 xhs_images/{note_id} 子目录中</small>
      </div>
      
      <button class="btn btn-primary" id="save-download">保存设置</button>
      <div id="download-success-msg" class="success-msg" style="display: none;"></div>
    </div>

    <div class="tab-content" id="auth-tab">
      <h2>认证配置</h2>
      
      <div class="form-group">
        <label for="auth-string">认证字符串</label>
        <input type="text" id="auth-string" placeholder="请输入认证字符串">
      </div>
      
      <button class="btn btn-primary" id="save-auth">保存认证</button>
      
      <div class="form-group">
        <label>设备码</label>
        <div id="machine-code" class="auth-status">加载中...</div>
      </div>
      
      <div class="form-group" style="display: flex; align-items: center; gap: 20px;">
        <div style="flex: 1;">
          <label>认证状态</label>
          <div id="auth-status" class="auth-status">未配置认证</div>
        </div>
        <div style="flex: 1;">
          <label>认证有效期</label>
          <div id="auth-expiry" class="auth-status">未配置认证</div>
        </div>
      </div>
      
      <div class="form-group" style="margin-top: 30px;">
        <h3>功能使用情况</h3>
        <div id="usage-info" class="auth-status" style="padding: 15px;">
          <div class="usage-item">提示词管理：<span id="prompt-usage">加载中...</span></div>
          <div class="usage-item">显示高价值笔记：<span id="high-value-usage">加载中...</span></div>
          <div class="usage-item">关键词拓展：<span id="keyword-usage">加载中...</span></div>
          <div class="usage-item">下载图片：<span id="download-usage">加载中...</span></div>
        </div>
      </div>
    </div>
  </div>
  
  <style>
    /* 开关样式 */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-label {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    
    .toggle-label:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .toggle-label {
      background-color: #2196F3;
    }
    
    input:checked + .toggle-label:before {
      transform: translateX(26px);
    }
    
    .hint {
      display: block;
      margin-top: 5px;
      color: #666;
      font-size: 12px;
    }
  </style>
  
  <script src="auth.js"></script>
  <script src="usageCounter.js"></script>
  <script src="options.js"></script>
</body>
</html>
